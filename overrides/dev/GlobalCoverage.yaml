#  ============================================================================
#  分流规则
#  ============================================================================
rules:
  #  1、本地直连
  - RULE-SET,lancidr,全局直连,no-resolve
  - RULE-SET,applications,全局直连
  - RULE-SET,private,全局直连

  #  2、广告过滤 & 本地拦截
  - RULE-SET,reject,广告过滤
  - RULE-SET,an-reject,广告过滤                  #  补充拦截
  
  #  3、游戏
  - RULE-SET,game-cn,国内游戏                    #  直连游戏
  - RULE-SET,game-intl,国际游戏                  #  代理游戏

  #  4、自定义规则
  - RULE-SET,an-direct,全局直连                  #  补充直连
  - RULE-SET,an-proxy,节点选择                   #  补充代理
  - RULE-SET,media-cn,国内媒体                   #  国内媒体
  
  #  5、精细化分流
  - RULE-SET,an-ai,AI
  - RULE-SET,an-youtube,YouTube
  - RULE-SET,an-netflix,Netflix,no-resolve
  - RULE-SET,an-tiktok,TikTok
  - RULE-SET,an-bahamut,动画疯
  - RULE-SET,media-intl,海外媒体                 #  海外媒体 
  
  #  6、服务类
  - RULE-SET,an-google,谷歌服务
  - RULE-SET,microsoft-intl,微软国际
  - RULE-SET,microsoft-cn,微软中国
  - RULE-SET,icloud,苹果服务
  - RULE-SET,apple,苹果服务
  - RULE-SET,telegramcidr,Telegram,no-resolve
  - GEOSITE,tracker,BT

  #  7、代理类
  - RULE-SET,gfw,节点选择
  - RULE-SET,proxy,节点选择
  
  #  8、非中国域名
  - RULE-SET,tld-not-cn,节点选择

  #  9、直连
  - GEOIP,LAN,全局直连,no-resolve
  - RULE-SET,direct,全局直连
  - RULE-SET,cncidr,全局直连,no-resolve
  - GEOSITE,CN,全局直连
  - GEOIP,CN,全局直连,no-resolve

  #  10、兜底（最后的兜底规则）
  - MATCH,漏网之鱼
