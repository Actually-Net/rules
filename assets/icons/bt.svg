<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48px" height="48px">
  <defs>
    <linearGradient id="magBody" x1="12" y1="2" x2="36" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff5252"/>
      <stop offset="1" stop-color="#c62828"/>
    </linearGradient>
    <linearGradient id="magPole" x1="10" y1="26" x2="38" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#b0bec5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Red Magnet Arch -->
    <path fill="url(#magBody)" d="M 10 26 v -10 c 0 -7.7 6.3 -14 14 -14 s 14 6.3 14 14 v 10 h -8 v -10 c 0 -3.3 -2.7 -6 -6 -6 s -6 2.7 -6 6 v 10 h -8 z"/>
    
    <!-- Silver Poles -->
    <path fill="url(#magPole)" d="M 10 26 h 8 v 5 c 0 1.1 -0.9 2 -2 2 h -4 c -1.1 0 -2 -0.9 -2 -2 v -5 z"/>
    <path fill="url(#magPole)" d="M 30 26 h 8 v 5 c 0 1.1 -0.9 2 -2 2 h -4 c -1.1 0 -2 -0.9 -2 -2 v -5 z"/>
  </g>

  <!-- Green Download Arrow in Center -->
  <path fill="#4caf50" d="M 22 17 v 8 h -3.5 l 5.5 6.5 l 5.5 -6.5 h -3.5 v -8 z" />
</svg>
