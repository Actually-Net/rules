#  Clash 全局覆写配置
#  用途：在节点订阅的基础上，完善 DNS、分流规则和代理组配置
#  兼容性：Clash / Clash Meta / Clash Verge 等 Clash 衍生版本

#  ============================================================================
#  基础配置（部分可选，端口、日志、tun等内容可注释后使用面板自带）
#  ============================================================================
mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

#  配置持久化
profile:
  #  保存代理组的手动选择结果，重启后继续使用
  store-selected: true
  #  保存 fake-ip 映射表，减少重复分配导致的波动
  store-fake-ip: true

#  统一延迟测试方式，减少不同协议节点因握手差异带来的测速偏差
unified-delay: true

#  对 DNS 返回的多个 IP 并发发起 TCP 连接，优先使用最先成功的连接
tcp-concurrent: true

#  进程识别模式：strict 更稳，适合连接归属显示和按进程排障
find-process-mode: strict

#  TUN 模式配置
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

#  ============================================================================
#  DNS 配置
#  ============================================================================
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  prefer-h3: false
  respect-rules: true
  use-system-hosts: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  
  #  Fake-IP 过滤（不经过 Fake-IP）
  fake-ip-filter:
    #  本地主机/设备
    - '*.lan'
    - 'localhost'
    - 'local'
    - '+.lan'
    - '+.local'
    #  Windows 网络出现小地球图标
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    #  QQ 快速登录检测失败
    - 'localhost.ptlogin2.qq.com'
    - 'localhost.sec.qq.com'
    #  追加条目
    - '+.in-addr.arpa'
    - '+.ip6.arpa'
    - 'time.*.com'
    - 'time.*.gov'
    - 'pool.ntp.org'
    #  微信快速登录检测失败
    - 'localhost.work.weixin.qq.com'
  
  #  解析直连 DNS 域名
  default-nameserver:
    - 223.5.5.5
    - 1.2.4.8
  
  #  代理 DNS 服务器
  nameserver:
    - https://1.1.1.1/dns-query             #  Cloudflare DNS
    - https://8.8.4.4/dns-query             #  Google DNS
  
  #  解析代理节点域名 / 代理链路相关域名
  proxy-server-nameserver:
    - 1.1.1.1             #  Cloudflare DNS
    - 8.8.4.4             #  Google DNS
  
  #  直连 DNS 服务器
  direct-nameserver:
    - https://223.5.5.5/dns-query           #  阿里 DoH
    - https://doh.pub/dns-query             #  腾讯 DoH

  #  回落 DNS
  fallback:
    - tcp://9.9.9.9:53
  
  #  DNS 策略（国内域名使用国内 DNS）
  nameserver-policy:
    'geosite:private,cn':
      - https://223.5.5.5/dns-query
      - https://doh.pub/dns-query


